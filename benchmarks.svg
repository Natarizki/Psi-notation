<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 950 900" width="100%" height="100%" style="background-color: #0b1120; font-family: 'Segoe UI', system-ui, sans-serif; border-radius: 20px;">

  <!-- DEFINI FILTER -->
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="gradPsi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgCard" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- HEADER UTAMA -->
  <text x="475" y="50" font-size="32" font-weight="900" fill="#f8fafc" text-anchor="middle" letter-spacing="2">⚡ ASYMPTOTIC NOTATIONS BENCHMARK</text>
  <text x="475" y="80" font-size="14" fill="#94a3b8" text-anchor="middle">A Comprehensive Visual Comparison: Classical (O, Ω, Θ, o, ω) vs. The Ψ (Psi) Innovation</text>
  
  <!-- BADGE STATUS -->
  <rect x="700" y="30" width="200" height="30" rx="15" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="800" y="50" font-size="11" fill="#94a3b8" text-anchor="middle">📌 v1.0 · Nata Rizki · 2026</text>

  <line x1="40" y1="105" x2="910" y2="105" stroke="#334155" stroke-width="1.5" />

  <!-- =============================================== -->
  <!-- 1. CHEAT SHEET (DEFINISI SINGKAT)              -->
  <!-- =============================================== -->
  <text x="40" y="140" font-size="16" font-weight="bold" fill="#e2e8f0">📋 1. Definition Cheat Sheet</text>

  <rect x="40" y="155" width="870" height="65" rx="8" fill="url(#bgCard)" stroke="#2d3a4f" stroke-width="1.5" filter="url(#shadow)"/>
  
  <text x="60" y="175" font-size="11" fill="#3b82f6" font-weight="bold">O (Big-O)</text>
  <text x="60" y="192" font-size="10" fill="#94a3b8">f ≤ c·g</text>
  <line x1="140" y1="165" x2="140" y2="205" stroke="#334155" stroke-width="1"/>

  <text x="160" y="175" font-size="11" fill="#22d3ee" font-weight="bold">Ω (Big-Omega)</text>
  <text x="160" y="192" font-size="10" fill="#94a3b8">f ≥ c·g</text>
  <line x1="260" y1="165" x2="260" y2="205" stroke="#334155" stroke-width="1"/>

  <text x="280" y="175" font-size="11" fill="#10b981" font-weight="bold">Θ (Big-Theta)</text>
  <text x="280" y="192" font-size="10" fill="#94a3b8">c₁g ≤ f ≤ c₂g</text>
  <line x1="390" y1="165" x2="390" y2="205" stroke="#334155" stroke-width="1"/>

  <text x="410" y="175" font-size="11" fill="#f59e0b" font-weight="bold">o (Little-o)</text>
  <text x="410" y="192" font-size="10" fill="#94a3b8">f/g → 0</text>
  <line x1="500" y1="165" x2="500" y2="205" stroke="#334155" stroke-width="1"/>

  <text x="520" y="175" font-size="11" fill="#ec4899" font-weight="bold">ω (Little-ω)</text>
  <text x="520" y="192" font-size="10" fill="#94a3b8">f/g → ∞</text>
  <line x1="610" y1="165" x2="610" y2="205" stroke="#334155" stroke-width="1"/>

  <!-- Psi di Cheat Sheet -->
  <text x="630" y="175" font-size="11" fill="#a78bfa" font-weight="bold">Ψ (Psi)</text>
  <text x="630" y="192" font-size="10" fill="#94a3b8">c₁g ≤ F₁ ≤ c₂g ≤ F₂ ≤ c₃g</text>

  <!-- =============================================== -->
  <!-- 2. NOTASI KLASIK (BOXES)                       -->
  <!-- =============================================== -->
  <line x1="40" y1="240" x2="910" y2="240" stroke="#334155" stroke-width="1" />
  <text x="40" y="270" font-size="16" font-weight="bold" fill="#e2e8f0">🎯 2. Classical Notation Types</text>

  <!-- Box O -->
  <rect x="40" y="290" width="160" height="85" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
  <text x="120" y="320" font-size="28" font-weight="bold" fill="#3b82f6" text-anchor="middle">O</text>
  <text x="120" y="340" font-size="11" fill="#94a3b8" text-anchor="middle">Batas ATAS</text>
  <text x="120" y="358" font-size="10" fill="#64748b" text-anchor="middle">f(n) ≤ c·g(n)</text>

  <!-- Box Ω -->
  <rect x="220" y="290" width="160" height="85" rx="10" fill="#1e293b" stroke="#22d3ee" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="320" font-size="28" font-weight="bold" fill="#22d3ee" text-anchor="middle">Ω</text>
  <text x="300" y="340" font-size="11" fill="#94a3b8" text-anchor="middle">Batas BAWAH</text>
  <text x="300" y="358" font-size="10" fill="#64748b" text-anchor="middle">f(n) ≥ c·g(n)</text>

  <!-- Box Θ -->
  <rect x="400" y="290" width="160" height="85" rx="10" fill="#1e293b" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
  <text x="480" y="320" font-size="28" font-weight="bold" fill="#10b981" text-anchor="middle">Θ</text>
  <text x="480" y="340" font-size="11" fill="#94a3b8" text-anchor="middle">Tight Bound</text>
  <text x="480" y="358" font-size="10" fill="#64748b" text-anchor="middle">c₁g ≤ f ≤ c₂g</text>

  <!-- Box o -->
  <rect x="580" y="290" width="160" height="85" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="660" y="320" font-size="28" font-weight="bold" fill="#f59e0b" text-anchor="middle">o</text>
  <text x="660" y="340" font-size="11" fill="#94a3b8" text-anchor="middle">Jauh LEBIH</text>
  <text x="660" y="358" font-size="10" fill="#64748b" text-anchor="middle">f/g → 0</text>

  <!-- Box ω -->
  <rect x="760" y="290" width="150" height="85" rx="10" fill="#1e293b" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
  <text x="835" y="320" font-size="28" font-weight="bold" fill="#ec4899" text-anchor="middle">ω</text>
  <text x="835" y="340" font-size="11" fill="#94a3b8" text-anchor="middle">Jauh LEBIH</text>
  <text x="835" y="358" font-size="10" fill="#64748b" text-anchor="middle">f/g → ∞</text>

  <text x="475" y="405" font-size="12" fill="#64748b" text-anchor="middle">→ Notasi klasik menganalisis SATU fungsi f(n) terhadap g(n).</text>

  <!-- =============================================== -->
  <!-- 3. NOTASI PSI (INOVASI) + VISUAL JEMBATAN      -->
  <!-- =============================================== -->
  <line x1="40" y1="430" x2="910" y2="430" stroke="#334155" stroke-width="1.5" />

  <text x="40" y="465" font-size="16" font-weight="bold" fill="#e2e8f0">🧠 3. The Ψ (Psi) Innovation: The "Bridge" Concept</text>

  <!-- Kotak Ungu Utama -->
  <rect x="40" y="485" width="870" height="120" rx="14" fill="url(#gradPsi)" filter="url(#shadow)"/>
  
  <text x="475" y="515" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Ψ (PSI) = ORDERED PAIR GUARANTEE</text>
  
  <!-- Formula Besar -->
  <text x="475" y="545" font-size="16" fill="#ddd6fe" text-anchor="middle">c₁·g ≤ F₁ ≤ c₂·g ≤ F₂ ≤ c₃·g</text>

  <!-- VISUAL JEMBATAN (Bridge Visual) -->
  <rect x="120" y="565" width="710" height="25" rx="6" fill="#1e293b" opacity="0.4"/>
  <text x="475" y="582" font-size="11" fill="#c4b5fd" text-anchor="middle">🟣 F₁ (Upstream)  ────  ≤  ──── 🔵 c₂·g(n) [JEMBATAN]  ────  ≤  ──── 🟢 F₂ (Downstream)</text>

  <!-- Key Insight Box -->
  <rect x="40" y="620" width="870" height="45" rx="10" fill="#2d3a4f" stroke="#475569" stroke-width="1"/>
  <text x="60" y="640" font-size="12" font-weight="bold" fill="#facc15">💡 WHY PSI?</text>
  <text x="60" y="656" font-size="12" fill="#cbd5e1">O/Ω/Θ menjawab "SEBERAPA CEPAT?" (1 fungsi). Ψ menjawab "APAKAH URUTANNYA AMAN?" (2 fungsi + jaminan F₁ ≤ F₂).</text>

  <!-- =============================================== -->
  <!-- 4. HASIL BENCHMARK (DATA TABEL)               -->
  <!-- =============================================== -->
  <line x1="40" y1="685" x2="910" y2="685" stroke="#334155" stroke-width="1.5" />

  <text x="40" y="720" font-size="16" font-weight="bold" fill="#e2e8f0">📊 4. Empirical Benchmark Results (vs g(n)=n)</text>

  <!-- Tabel 1: Fungsi Tunggal -->
  <rect x="40" y="740" width="870" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  
  <text x="60" y="762" font-size="12" font-weight="bold" fill="#94a3b8">Fungsi</text>
  <text x="280" y="762" font-size="12" font-weight="bold" fill="#94a3b8">Klasifikasi</text>
  <text x="540" y="762" font-size="12" font-weight="bold" fill="#94a3b8">Interpretasi / Status</text>
  <line x1="40" y1="775" x2="910" y2="775" stroke="#334155" stroke-width="1" />

  <!-- Baris 1: n² -->
  <text x="60" y="800" font-size="14" font-weight="bold" fill="#f1f5f9">n²</text>
  <rect x="270" y="786" width="80" height="24" rx="6" fill="#ec4899" />
  <text x="310" y="803" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">ω</text>
  <text x="540" y="800" font-size="13" fill="#cbd5e1">Jauh lebih besar (f/g → ∞)</text>

  <!-- Baris 2: log n -->
  <text x="60" y="825" font-size="14" font-weight="bold" fill="#f1f5f9">log₂ n</text>
  <rect x="270" y="811" width="80" height="24" rx="6" fill="#f59e0b" />
  <text x="310" y="828" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">o</text>
  <text x="540" y="825" font-size="13" fill="#cbd5e1">Jauh lebih kecil (f/g → 0)</text>

  <!-- Baris 3: 5n -->
  <text x="60" y="850" font-size="14" font-weight="bold" fill="#f1f5f9">5n</text>
  <rect x="270" y="836" width="80" height="24" rx="6" fill="#10b981" />
  <text x="310" y="853" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Θ</text>
  <text x="540" y="850" font-size="13" fill="#cbd5e1">Setara dengan n (0.1 ≤ rasio ≤ 10)</text>

  <!-- =============================================== -->
  <!-- 5. HASIL TES PSI (PASS/FAIL)                   -->
  <!-- =============================================== -->
  <rect x="40" y="865" width="870" height="80" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>

  <!-- Kasus 1: LULUS -->
  <rect x="60" y="885" width="18" height="18" rx="4" fill="#10b981" />
  <text x="90" y="899" font-size="13" font-weight="bold" fill="#cbd5e1">F1=2n+5</text>
  <text x="170" y="899" font-size="13" fill="#64748b">vs</text>
  <text x="195" y="899" font-size="13" font-weight="bold" fill="#cbd5e1">F2=3n+10</text>
  <rect x="340" y="882" width="110" height="24" rx="6" fill="#065f46" />
  <text x="395" y="899" font-size="12" font-weight="bold" fill="#34d399" text-anchor="middle">✅ LULUS</text>
  <text x="480" y="899" font-size="12" fill="#94a3b8">→ 100% F1 ≤ F2 (Tidak ada bottleneck)</text>

  <!-- Kasus 2: GAGAL -->
  <rect x="60" y="915" width="18" height="18" rx="4" fill="#ef4444" />
  <text x="90" y="929" font-size="13" font-weight="bold" fill="#cbd5e1">F1=10n</text>
  <text x="170" y="929" font-size="13" fill="#64748b">vs</text>
  <text x="195" y="929" font-size="13" font-weight="bold" fill="#cbd5e1">F2=2n</text>
  <rect x="340" y="912" width="110" height="24" rx="6" fill="#7f1d1d" />
  <text x="395" y="929" font-size="12" font-weight="bold" fill="#f87171" text-anchor="middle">❌ GAGAL</text>
  <text x="480" y="929" font-size="12" fill="#94a3b8">→ 100% F1 > F2 (Bottleneck terdeteksi!)</text>

  <!-- FOOTER -->
  <line x1="40" y1="960" x2="910" y2="960" stroke="#334155" stroke-width="1.5" />
  <text x="475" y="980" font-size="11" fill="#475569" text-anchor="middle">© 2026 The Psi Notation Project · Classical notations analyze 1 function; Ψ analyzes ordered pairs (F₁, F₂).</text>

</svg>
